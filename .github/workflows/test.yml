name: Update SmartCookieWeb Status

on:
  schedule:
    - cron: '0 0 * * 1' # Runs every Monday
  workflow_dispatch: # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    # Added permissions to allow the bot to push changes to your README
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Release Logic
        id: release_check
        run: |
          title="SmartWebCookie Preview"
          
          # 1. Fetch Data (Added -r to jq for raw strings)
          SCWP_YEAR=$(curl -s "https://api.github.com/repos/CookieJarApps/SmartCookieWeb-Preview" | jq -r '.pushed_at' | xargs -r | cut -c 3-4)
          SCWP_MONTH=$(curl -s "https://api.github.com/repos/CookieJarApps/SmartCookieWeb-Preview" | jq -r '.pushed_at' | xargs -r | cut -c 6-7)
          SCWP_DAY=$(curl -s "https://api.github.com/repos/CookieJarApps/SmartCookieWeb-Preview" | jq -r '.pushed_at' | xargs -r | cut -c 9-10)
          
          date_year=$(date +%y)
          date_month=$(date +%m)
          date_day=$(date +%d)

          # 2. Your Original Logic Block
          if [ "$SCWP_YEAR" -eq "$date_year" ]; then
              eq_curr_yr=y
          else
              eq_curr_yr=n
          fi

          if [ "$SCWP_DAY" -lt "$date_day" ]; then
              lt_curr_day=y
          else
              lt_curr_day=n
          fi

          if [ "$SCWP_MONTH" -eq "$date_month" ]; then
              eq_curr_month=y
              # Nesting logic for Active Status
              if [ "$eq_curr_yr" = "y" ]; then
                  if [ "$eq_curr_day" = "y" ] || [ "$lt_curr_day" = "y" ]; then
                      IS_ACTIVE="✅"
                  fi
              fi
          else
              if [ "$SCWP_MONTH" -gt "$date_month" ]; then
                  gt_curr_month=y
              else
                  gt_curr_month=n
              fi
              if [ "$SCWP_MONTH" -lt "$date_month" ]; then
                  lt_curr_month=y
              else
                  lt_curr_month=n
              fi
          fi

          # Handling the Year-over-year gap
          if [ "$SCWP_YEAR" -lt "$date_year" ]; then
              echo "$title is out of date"
              IS_ACTIVE="❌"
          fi

          # 3. Apply the SED command
          # Note: If IS_ACTIVE is empty, we provide a default '?' to avoid sed errors
          ACTIVE_VAL=${IS_ACTIVE:-"❓"}
          sed -i "s63/Active Updates: .*/Active Updates: $ACTIVE_VAL/g" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if the file actually changed
          git commit -m "Automated status update: $(date)" || echo "No changes to commit"
          git push
