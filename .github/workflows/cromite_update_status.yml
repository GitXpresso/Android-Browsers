name: Cromite Update Active Status

on:
  schedule:
    - cron: '2 * * * *'
  workflow_dispatch: # Allows manual trigger

jobs:
  update-readme:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Release Logic
        id: release_check
        run: |
          
          YEAR=$(curl -s "https://api.github.com/repos/uazo/cromite" | jq '.pushed_at' | xargs -r | cut -c 3-4)
          MONTH=$(curl -s "https://api.github.com/repos/uazo/cromite" | jq '.pushed_at' | xargs -r | cut -c 6-7
          DAY=$(curl -s "https://api.github.com/repos/uazo/cromite | jq '.pushed_at' | xargs -r | cut -c 9-10)
          
          date_year=$(date +%y)
          date_month=$(date +%m)
          date_day=$(date +%d)
          
          if [ "$YEAR" -eq "$date_year" ]; then
              eq_curr_yr=y
          else
              eq_curr_yr=n
          fi

          if [ "$DAY" -lt "$date_day" ]; then
              lt_curr_day=y
          else
              lt_curr_day=n
          fi

          if [ "$MONTH" -eq "$date_month" ]; then
              eq_curr_month=y
              # Nesting logic for Active Status
              if [ "$eq_curr_yr" = "y" ]; then
                  if [ "$eq_curr_day" = "y" ] || [ "$lt_curr_day" = "y" ]; then
                      IS_ACTIVE="✅"
                  fi
              fi
          else
              if [ "$MONTH" -gt "$date_month" ]; then
                  gt_curr_month=y
              else
                  gt_curr_month=n
              fi
              if [ "$MONTH" -lt "$date_month" ]; then
                  lt_curr_month=y
              else
                  lt_curr_month=n
              fi
          fi

          # Handling the Year-over-year gap
          if [ "$YEAR" -lt "$date_year" ]; then
              IS_ACTIVE="❌"
          fi

          # 3. Apply the SED command
          # Note: If IS_ACTIVE is empty, we provide a default '?' to avoid sed errors
          ACTIVE_VAL=${IS_ACTIVE:-"❓"}
          sed -i "25s/Active Updates: .*/Active Updates: $ACTIVE_VAL/g" README.md

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit if the file actually changed
          git commit -m "Automated status update: $(date)" || echo "No changes to commit"
          git push
